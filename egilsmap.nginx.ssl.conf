# Полный конфиг с SSL (после certbot). Использовать:
# sudo cp egilsmap.nginx.ssl.conf /etc/nginx/sites-available/egilsmap
# sudo nginx -t && sudo systemctl reload nginx

server {
    server_name egilsmap.ru www.egilsmap.ru;

    # Фронтенд (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Бэкенд: login, register, oauth-sync (вызываются из NextAuth)
    location = /api/auth/login { proxy_pass http://localhost:8000/auth/login; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/register { proxy_pass http://localhost:8000/auth/register; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/oauth-sync { proxy_pass http://localhost:8000/auth/oauth-sync; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/telegram { proxy_pass http://localhost:8000/auth/telegram; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    # NextAuth (session, callback, csrf) — в Next.js
    location /api/auth/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальной API — бэкенд
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/egilsmap.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/egilsmap.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name egilsmap.ru www.egilsmap.ru;
    if ($host = www.egilsmap.ru) { return 301 https://$host$request_uri; }
    if ($host = egilsmap.ru) { return 301 https://$host$request_uri; }
    return 404;
}
