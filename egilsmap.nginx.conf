server {
    listen 80;
    server_name egilsmap.ru www.egilsmap.ru;

    # Фронтенд (Next.js)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Бэкенд: login, register, oauth-sync (вызываются из NextAuth authorize)
    location = /api/auth/login { proxy_pass http://localhost:8000/auth/login; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/register { proxy_pass http://localhost:8000/auth/register; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/oauth-sync { proxy_pass http://localhost:8000/auth/oauth-sync; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }
    location = /api/auth/telegram { proxy_pass http://localhost:8000/auth/telegram; proxy_set_header Host $host; proxy_set_header X-Forwarded-Proto $scheme; }

    # NextAuth (session, callback, csrf, providers) — в Next.js
    location /api/auth/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Остальной API — бэкенд
    location /api/ {
        proxy_pass http://localhost:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
